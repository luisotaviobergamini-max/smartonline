<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Online — Classificados Gamer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    /* =====================================================================
   SMART ONLINE — DESIGN TOKENS
   Palette: deep space HUD, violet core signal, cyan telemetry, gold VIP
   Type: Chakra Petch (display/HUD), Inter (body/UI), JetBrains Mono (data)
   Signature: HUD status bar clock + hazard-striped VIP price-lock
   ===================================================================== */
    :root {
      --bg: #0A0C14;
      --bg-alt: #0E111C;
      --elevated: #131725;
      --glass: rgba(255, 255, 255, .05);
      --glass-strong: rgba(255, 255, 255, .08);
      --border: rgba(255, 255, 255, .10);
      --border-soft: rgba(255, 255, 255, .06);
      --primary: #7C5CFF;
      --primary-bright: #9B84FF;
      --primary-dim: #4A3A99;
      --cyan: #2FE8D9;
      --success: #22C55E;
      --success-dim: #123322;
      --danger: #F0453A;
      --danger-dim: #331313;
      --gold: #F5B93E;
      --text: #F4F5FA;
      --text-muted: #9CA3B8;
      --text-faint: #5C6478;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 24px;
      --shadow-card: 0 8px 30px rgba(0, 0, 0, .35);
      --shadow-glow: 0 0 40px rgba(124, 92, 255, .25);
      --font-display: 'Chakra Petch', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    [data-theme="light"] {
      --bg: #F3F3F8;
      --bg-alt: #EAEAF3;
      --elevated: #FFFFFF;
      --glass: rgba(20, 20, 40, .04);
      --glass-strong: rgba(20, 20, 40, .07);
      --border: rgba(20, 20, 40, .10);
      --border-soft: rgba(20, 20, 40, .06);
      --text: #161826;
      --text-muted: #5B5F73;
      --text-faint: #8A8DA0;
      --success-dim: #E4F8EA;
      --danger-dim: #FBE7E5;
      --shadow-card: 0 8px 30px rgba(20, 20, 40, .08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(124, 92, 255, .18), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(47, 232, 217, .10), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      transition: background-color .3s ease, color .3s ease;
      -webkit-font-smoothing: antialiased;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    input,
    select,
    textarea {
      font-family: inherit;
    }

    ::selection {
      background: var(--primary);
      color: #fff;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: .001ms !important;
        transition-duration: .001ms !important;
      }
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .hidden {
      display: none !important;
    }

    /* ---------- glass / card system ---------- */
    .glass {
      background: linear-gradient(180deg, var(--glass-strong), var(--glass));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card {
      background: linear-gradient(160deg, var(--elevated), var(--bg-alt));
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      transition: transform .25s cubic-bezier(.2, .8, .2, 1), box-shadow .25s ease, border-color .25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(124, 92, 255, .4);
      box-shadow: 0 14px 40px rgba(0, 0, 0, .4);
    }

    /* ---------- buttons ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .2px;
      transition: transform .15s ease, box-shadow .2s ease, filter .2s ease, background .2s ease;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #5E3FE8);
      color: #fff;
      box-shadow: 0 8px 24px rgba(124, 92, 255, .35);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 10px 30px rgba(124, 92, 255, .5);
    }

    .btn-success {
      background: linear-gradient(135deg, #2ED973, var(--success));
      color: #062412;
      box-shadow: 0 8px 24px rgba(34, 197, 94, .35);
    }

    .btn-success:hover {
      filter: brightness(1.08);
    }

    .btn-danger {
      background: linear-gradient(135deg, #FF5B50, var(--danger));
      color: #fff;
    }

    .btn-ghost {
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      background: var(--glass-strong);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 12.5px;
      border-radius: 9px;
    }

    .btn-block {
      width: 100%;
    }

    .btn[disabled] {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ---------- header / HUD ---------- */
    header.topbar {
      position: sticky;
      top: 0;
      z-index: 60;
      background: rgba(10, 12, 20, .72);
      border-bottom: 1px solid var(--border-soft);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    [data-theme="light"] header.topbar {
      background: rgba(243, 243, 248, .78);
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: .5px;
    }

    .brand .mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--primary), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #0A0C14;
      box-shadow: 0 0 20px rgba(124, 92, 255, .6);
    }

    .brand span.accent {
      color: var(--cyan);
    }

    nav.mainnav {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    nav.mainnav a {
      padding: 9px 14px;
      border-radius: 9px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-muted);
      transition: all .2s ease;
    }

    nav.mainnav a:hover,
    nav.mainnav a.active {
      color: var(--text);
      background: var(--glass);
    }

    .hud-clock {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--cyan);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.35;
      border: 1px solid rgba(47, 232, 217, .3);
      border-radius: 9px;
      padding: 6px 12px;
      background: rgba(47, 232, 217, .06);
      text-shadow: 0 0 8px rgba(47, 232, 217, .5);
    }

    .hud-clock b {
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--cyan);
    }

    .hud-clock small {
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--glass);
      border: 1px solid var(--border);
      font-size: 16px;
      transition: all .2s ease;
    }

    .icon-btn:hover {
      background: var(--glass-strong);
    }

    .badge-pill {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .badge-vip {
      background: rgba(245, 185, 62, .15);
      color: var(--gold);
      border: 1px solid rgba(245, 185, 62, .4);
    }

    .badge-admin {
      background: rgba(124, 92, 255, .15);
      color: var(--primary-bright);
      border: 1px solid rgba(124, 92, 255, .4);
    }

    .badge-guest {
      background: var(--glass);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .mobile-toggle {
      display: none;
    }

    @media (max-width:960px) {
      nav.mainnav {
        display: none;
      }

      .mobile-toggle {
        display: flex;
      }

      .hud-clock {
        display: none;
      }
    }

    /* ---------- mobile drawer ---------- */
    #mobileDrawer {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
    }

    #mobileDrawer.open {
      display: block;
    }

    #mobileDrawer .scrim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .6);
    }

    #mobileDrawer .panel {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: 78%;
      max-width: 320px;
      background: var(--elevated);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-left: 1px solid var(--border);
      animation: slideIn .25s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(0);
      }
    }

    #mobileDrawer a,
    #mobileDrawer button {
      padding: 14px 12px;
      border-radius: 10px;
      text-align: left;
      font-weight: 600;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
    }

    #mobileDrawer a:hover,
    #mobileDrawer button:hover {
      background: var(--glass);
    }

    /* ---------- hero ---------- */
    .hero {
      padding: 60px 0 40px;
      position: relative;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 40px;
      align-items: center;
    }

    @media (max-width:900px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .eyebrow::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .35;
      }
    }

    h1.headline {
      font-family: var(--font-display);
      font-size: 44px;
      line-height: 1.08;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1.headline .grad {
      background: linear-gradient(135deg, var(--primary-bright), var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p.sub {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 520px;
      margin-bottom: 26px;
    }

    .hero-ctas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* VIP hero card (signature) */
    .vip-card {
      position: relative;
      border-radius: var(--radius-lg);
      padding: 30px;
      background: linear-gradient(160deg, rgba(124, 92, 255, .16), rgba(47, 232, 217, .05));
      border: 1px solid rgba(124, 92, 255, .35);
      box-shadow: var(--shadow-glow);
      overflow: hidden;
    }

    .vip-card::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(47, 232, 217, .35), transparent 70%);
      filter: blur(10px);
    }

    .vip-card .tag {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .vip-card h3 {
      font-family: var(--font-display);
      font-size: 26px;
      margin-bottom: 4px;
    }

    .vip-card .grouptext {
      color: var(--text-muted);
      font-size: 13.5px;
      margin-bottom: 20px;
    }

    .price-block {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .price-block .val {
      font-family: var(--font-mono);
      font-size: 46px;
      font-weight: 700;
      color: #fff;
    }

    .price-block .cur {
      font-family: var(--font-mono);
      font-size: 20px;
      color: var(--gold);
    }

    .price-sub {
      color: var(--text-faint);
      font-size: 12.5px;
      margin-bottom: 22px;
    }

    .benefits {
      list-style: none;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .benefits li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .benefits li .check {
      color: var(--success);
      font-weight: 800;
    }

    /* ---------- section headers ---------- */
    .section {
      padding: 50px 0;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .section-head h2 {
      font-family: var(--font-display);
      font-size: 26px;
    }

    .section-head p {
      color: var(--text-muted);
      font-size: 13.5px;
      margin-top: 4px;
    }

    /* ---------- grids ---------- */
    .grid {
      display: grid;
      gap: 20px;
    }

    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .grid-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    @media (max-width:960px) {

      .grid-3,
      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width:600px) {

      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }
    }

    /* ---------- listing cards (store & classifieds) ---------- */
    .listing-card {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .listing-media {
      position: relative;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #1c2033, #11131c);
      overflow: hidden;
    }

    .listing-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .listing-media .noimg {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      font-size: 12px;
      font-family: var(--font-mono);
    }

    .sold-ribbon {
      position: absolute;
      top: 16px;
      left: -38px;
      transform: rotate(-38deg);
      background: linear-gradient(135deg, #FF5B50, var(--danger));
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 5px 46px;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
    }

    .listing-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .listing-title {
      font-weight: 700;
      font-size: 15px;
      line-height: 1.35;
    }

    .listing-loc {
      font-size: 12px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .listing-prices {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: auto;
      padding-top: 10px;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .price-row .label {
      color: var(--text-faint);
    }

    .price-normal {
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .price-vip-value {
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--success);
    }

    .vip-locked {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .locked-bar {
      height: 16px;
      flex: 1;
      border-radius: 4px;
      background: repeating-linear-gradient(135deg, #0d0d0d, #0d0d0d 6px, #1a1a1a 6px, #1a1a1a 12px);
      border: 1px solid rgba(245, 185, 62, .3);
    }

    .locked-cta {
      font-size: 10.5px;
      color: var(--gold);
      font-weight: 700;
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px;
    }

    /* ---------- forms ---------- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width:640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1/-1;
    }

    .field label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .field input,
    .field select,
    .field textarea {
      padding: 11px 13px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
      font-size: 14px;
      transition: border-color .2s ease, background .2s ease;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--glass-strong);
    }

    .field textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* ---------- modal ---------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 6, 10, .7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal-box {
      background: linear-gradient(160deg, var(--elevated), var(--bg-alt));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      max-width: 520px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .5);
      animation: popIn .25s cubic-bezier(.2, .9, .3, 1.2);
    }

    .modal-box.wide {
      max-width: 760px;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.94) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-soft);
    }

    .modal-head h3 {
      font-family: var(--font-display);
      font-size: 18px;
    }

    .modal-close {
      background: var(--glass);
      border: 1px solid var(--border);
      width: 32px;
      height: 32px;
      border-radius: 9px;
      font-size: 16px;
      color: var(--text-muted);
    }

    .modal-body {
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-foot {
      padding: 16px 24px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ---------- toast ---------- */

          comunidade gamer.</p>

  <!-- ================= APP LOGIC (Firebase) ================= -->
  <script>
    /* =====================================================================
       CONFIGURAÇÃO DO FIREBASE
       ===================================================================== */
    const firebaseConfig = {
      apiKey: "AIzaSyB522MB0SN7qBc83qeAd4CLXSeHQgL4yjo",
      authDomain: "lojagame-744cb.firebaseapp.com",
      projectId: "lojagame-744cb",
      storageBucket: "lojagame-744cb.firebasestorage.app",
      messagingSenderId: "795217712078",
      appId: "1:795217712078:web:d76d5348c4ef5010e8919f"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Configurar Firestore para usar cache offline
    db.enablePersistence({ synchronizeTabs: true })
      .catch((err) => {
        console.warn('Erro ao habilitar persistência:', err);
      });

    /* =====================================================================
       CAMADA DE PERSISTÊNCIA - FIRESTORE
       ===================================================================== */

    // Funções reutilizáveis de persistência
    function saveData(key, data) {
      // Esta função é mantida para compatibilidade, mas agora usa Firestore
      return setDoc(key, data);
    }

    async function loadData(key) {
      // Esta função é mantida para compatibilidade, mas agora usa Firestore
      try {
        const snapshot = await db.collection(key).get();
        const items = [];
        snapshot.forEach(doc => {
          items.push({ id: doc.id, ...doc.data() });
        });
        return items;
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
        return [];
      }
    }

    function updateData(key, callback) {
      // Esta função é mantida para compatibilidade, mas agora usa Firestore
      return updateCollection(key, callback);
    }

    function deleteData(key) {
      // Esta função é mantida para compatibilidade
      return deleteCollection(key);
    }

    function generateId() {
      return db.collection('dummy').doc().id;
    }

    function now() {
      return new Date().toISOString();
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleDateString('pt-BR');
    }

    function formatTime(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    // =====================================================================
    // FUNÇÕES FIRESTORE
    // =====================================================================

    // Obter todos os documentos de uma coleção
    async function getCollection(collectionName) {
      try {
        const snapshot = await db.collection(collectionName).get();
        const items = [];
        snapshot.forEach(doc => {
          items.push({ id: doc.id, ...doc.data() });
        });
        return items;
      } catch (e) {
        console.error('Erro ao buscar coleção:', e);
        return [];
      }
    }

    // Obter um documento por ID
    async function getDocById(collectionName, id) {
      try {
        const doc = await db.collection(collectionName).doc(id).get();
        if (doc.exists) {
          return { id: doc.id, ...doc.data() };
        }
        return null;
      } catch (e) {
        console.error('Erro ao buscar documento:', e);
        return null;
      }
    }

    // Adicionar um documento
    async function addDoc(collectionName, data) {
      try {
        const docRef = await db.collection(collectionName).add({
          ...data,
          criadoEm: now(),
          atualizadoEm: now()
        });
        const newDoc = await docRef.get();
        return { id: newDoc.id, ...newDoc.data() };
      } catch (e) {
        console.error('Erro ao adicionar documento:', e);
        throw e;
      }
    }

    // Definir um documento (criar ou substituir)
    async function setDoc(collectionName, id, data, merge = true) {
      try {
        const docRef = db.collection(collectionName).doc(id);
        const docData = {
          ...data,
          atualizadoEm: now()
        };
        if (!merge) {
          docData.criadoEm = now();
        }
        await docRef.set(docData, { merge: merge });
        const newDoc = await docRef.get();
        return { id: newDoc.id, ...newDoc.data() };
      } catch (e) {
        console.error('Erro ao definir documento:', e);
        throw e;
      }
    }

    // Atualizar um documento
    async function updateDoc(collectionName, id, data) {
      try {
        await db.collection(collectionName).doc(id).update({
          ...data,
          atualizadoEm: now()
        });
        const doc = await db.collection(collectionName).doc(id).get();
        return { id: doc.id, ...doc.data() };
      } catch (e) {
        console.error('Erro ao atualizar documento:', e);
        throw e;
      }
    }

    // Atualizar uma coleção (callback)
    async function updateCollection(collectionName, callback) {
      try {
        const items = await getCollection(collectionName);
        const result = callback(items);
        // Para cada item modificado, atualizar no Firestore
        for (const item of result) {
          if (item.id) {
            await db.collection(collectionName).doc(item.id).set(item, { merge: true });
          }
        }
        return result;
      } catch (e) {
        console.error('Erro ao atualizar coleção:', e);
        throw e;
      }
    }

    // Excluir um documento
    async function deleteDoc(collectionName, id) {
      try {
        await db.collection(collectionName).doc(id).delete();
        return true;
      } catch (e) {
        console.error('Erro ao excluir documento:', e);
        throw e;
      }
    }

    // Excluir uma coleção inteira (cuidado!)
    async function deleteCollection(collectionName) {
      try {
        const snapshot = await db.collection(collectionName).get();
        const batch = db.batch();
        snapshot.forEach(doc => {
          batch.delete(doc.ref);
        });
        await batch.commit();
        return true;
      } catch (e) {
        console.error('Erro ao excluir coleção:', e);
        throw e;
      }
    }

    // Query com filtros
    async function queryCollection(collectionName, filters = [], orderByField = null, orderDirection = 'desc') {
      try {
        let query = db.collection(collectionName);

        // Aplicar filtros
        for (const filter of filters) {
          const { field, operator, value } = filter;
          switch (operator) {
            case '==':
              query = query.where(field, '==', value);
              break;
            case '!=':
              query = query.where(field, '!=', value);
              break;
            case '>':
              query = query.where(field, '>', value);
              break;
            case '>=':
              query = query.where(field, '>=', value);
              break;
            case '<':
              query = query.where(field, '<', value);
              break;
            case '<=':
              query = query.where(field, '<=', value);
              break;
            case 'array-contains':
              query = query.where(field, 'array-contains', value);
              break;
          }
        }

        // Ordenar
        if (orderByField) {
          query = query.orderBy(orderByField, orderDirection);
        }

        const snapshot = await query.get();
        const items = [];
        snapshot.forEach(doc => {
          items.push({ id: doc.id, ...doc.data() });
        });
        return items;
      } catch (e) {
        console.error('Erro ao fazer query:', e);
        return [];
      }
    }

          docs.push({
            id: doc.id,
            data: () => ({ ...doc.data() }),
            exists: true
          });
        });
        const result = {
          docs: docs,
          forEach: (fn) => docs.forEach(doc => fn(doc)),
          docChanges: () => snapshot.docChanges()
        };
        callback(result);
      }, (error) => {
        console.error('Erro no listener:', error);
        if (errorCallback) errorCallback(error);
      });

      return unsubscribe;
    }

    async function migrateLocalStorageToFirestore() {
      try {
        const collections = ['config', 'users', 'admins', 'vips', 'store', 'classificados', 'mural', 'payments', 'settings'];

        for (const collectionName of collections) {
          // Verificar se já existem dados no Firestore
          const snapshot = await db.collection(collectionName).limit(1).get();
          if (!snapshot.empty) continue; // Já tem dados

          // Carregar dados do LocalStorage
          const localData = JSON.parse(localStorage.getItem('smartonline_' + collectionName) || '[]');
          if (localData.length === 0) continue;

          // Migrar para o Firestore
          const batch = db.batch();
          for (const item of localData) {
            const docRef = db.collection(collectionName).doc(item.id || generateId());
            batch.set(docRef, item);
          }
          await batch.commit();
          console.log(`Coleção ${collectionName} migrada com sucesso!`);
        }
      } catch (e) {
        console.error('Erro ao migrar dados:', e);
      }
    }

    // Função para calcular dias restantes
    function getDaysRemaining(vip) {
      if (!vip.dataVencimento || vip.status !== 'liberado') return null;
      const nowDate = new Date();
      const expirationDate = new Date(vip.dataVencimento);
      const diffTime = expirationDate - nowDate;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays;
    }

    // Função para obter status de validade
    function getValidityStatus(vip) {
      const days = getDaysRemaining(vip);
      if (days === null) return { status: 'inactive', label: 'Inativo', class: 'expired' };
      if (days < 0) return { status: 'expired', label: 'Expirado', class: 'expired' };
      if (days <= 7) return { status: 'expiring', label: 'Próximo do vencimento', class: 'expiring' };
      return { status: 'active', label: 'Ativo', class: 'active' };
    }

    const isAdmin = () => state.role === "admin";

    // Função para verificar se o usuário pode ver um produto da loja
    function canSeeStoreItem(item) {
      if (isAdmin()) return true;
      if (!item.visibilidade || !Array.isArray(item.visibilidade) || item.visibilidade.length === 0) {
        return true;
      }

      const isVipUser = state.user && state.role === 'vip';

      if (isVipUser && item.visibilidade.includes('vip')) return true;
      if (!state.user && item.visibilidade.includes('visitante')) return true;
      if (isVipUser && item.visibilidade.includes('visitante')) return true;

      return false;
    }

    async function saveStoreItem(payload, id) {
      const data = { ...payload, atualizadoEm: now() };
      if (id) {
        await updateDoc('store', id, data);
        toast("Anúncio da loja atualizado.");
      } else {
        data.criadoEm = now();
        data.status = "disponivel";
        if (!data.categoria) data.categoria = "novo";
        if (!data.visibilidade || !Array.isArray(data.visibilidade) || data.visibilidade.length === 0) {
          data.visibilidade = ["visitante", "vip"];
        }
        await addDoc('store', data);
        toast("Anúncio publicado na loja.");

    /* =====================================================================

       ===================================================================== */
    async function uploadPhoto(file, pathPrefix) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          resolve(e.target.result);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function storeCardHTML(item) {
      const categoriaLabel = item.categoria === "novo" ? "🆕 NOVO" : "🔄 USADO";

      return `

          ${isAdmin() ? `<div class="card-actions">

    window.__editStore = (id) => openStoreFormModal(state.storeItems.find(i => i.id === id));

    function classCardHTML(item) {
      const canEdit = canEditClassificado(item);
      return `
        <div class="card listing-card">
          <div class="listing-media">

            <button class="btn btn-danger btn-sm" onclick='window.__deleteClass(${JSON.stringify(item.id)})'>Excluir</button>
          </div>` : ""}
        </div>`;
    }
    window.__editClass = (id) => openClassFormModal(state.classItems.find(i => i.id === id));
    window.__deleteClass = (id) => confirmAction("Excluir este anúncio?", () => deleteClassificado(id));
    window.__toggleClassSold = (id) => toggleClassSold(state.classItems.find(i => i.id === id));

    function emptyState(icon, text) { return `<div class="empty-state" style="grid-column:1/-1;"><div class="em-ic">${icon}</div><p>${text}</p></div>`; }

    // =====================================================================
    // LOJA ONLINE COM CATEGORIAS E VISIBILIDADE
    // =====================================================================
    function renderLoja() {
      let items = state.storeItems.filter(item => canSeeStoreItem(item));

      let filteredItems = items;
      let showNovos = 0;
      let showUsados = 0;

      if (state.storeCategoria === "novo") {
        filteredItems = items.filter(item => item.categoria === "novo");
        showNovos = items.filter(item => item.categoria === "novo").length;
        showUsados = items.filter(item => item.categoria === "usado").length;
      } else if (state.storeCategoria === "usado") {
        filteredItems = items.filter(item => item.categoria === "usado");
        showNovos = items.filter(item => item.categoria === "novo").length;
        showUsados = items.filter(item => item.categoria === "usado").length;
      } else {
        showNovos = items.filter(item => item.categoria === "novo").length;
        showUsados = items.filter(item => item.categoria === "usado").length;
      }

      const totalVisiveis = items.length;

      return `
        <section class="section container">
          <div class="section-head">
            <div>
              <h2>🛒 Loja Online</h2>
              <p>${totalVisiveis} produto${totalVisiveis !== 1 ? 's' : ''} disponíve${totalVisiveis !== 1 ? 'is' : 'l'}</p>
            </div>
            ${isAdmin() ? `<button class="btn btn-primary btn-sm" onclick="openStoreFormModal()">+ Novo item</button>` : ""}
          </div>

          <div class="store-tabs">
            <button class="store-tab ${state.storeCategoria === "todos" ? "active" : ""}" 
                    onclick="window.__setStoreCategoria('todos')">
              📦 Todos <span class="count">${totalVisiveis}</span>
            </button>
            <button class="store-tab ${state.storeCategoria === "novo" ? "active" : ""}" 
                    onclick="window.__setStoreCategoria('novo')">
              🆕 Novos <span class="count">${showNovos}</span>
            </button>
            <button class="store-tab ${state.storeCategoria === "usado" ? "active" : ""}" 
                    onclick="window.__setStoreCategoria('usado')">
              🔄 Usados <span class="count">${showUsados}</span>
            </button>
          </div>

          <div class="grid grid-4">
            ${filteredItems.length ? filteredItems.map(storeCardHTML).join("") :
          `<div class="empty-state" style="grid-column:1/-1;">
                <div class="em-ic">📦</div>
                <p>Nenhum produto encontrado nesta categoria.</p>
              </div>`
        }
          </div>
        </section>

    window.__setStoreCategoria = function (categoria) {

      return `
        <section class="section container">

    window.__anunciarClick = function () {

    // =====================================================================
    // PÁGINA MURAL
    // =====================================================================
    function renderComoFunciona() {
      const messages = [...state.muralMessages].sort((a, b) => {
        return new Date(b.dataHora) - new Date(a.dataHora);
      });

      const totalMessages = messages.length;

      return `
        <section class="section container">
          <div class="section-head">
            <div>
              <h2>📋 Mural de Recados</h2>
              <p>Deixe seu recado para a comunidade</p>
            </div>
            <span class="mural-counter">${totalMessages} mensagem${totalMessages !== 1 ? 's' : ''}</span>
          </div>

          <div class="card mural-form" style="padding:24px;">
            <h3 style="font-family:var(--font-display);font-size:18px;margin-bottom:16px;">✏️ Escreva um recado</h3>
            <form id="muralForm" onsubmit="return false;">
              <div class="form-grid">
                <div class="field">
                  <label>Seu nome *</label>
                  <input id="muralNome" placeholder="Digite seu nome" required>
                </div>
                <div class="field">
                  <label>Cidade *</label>
                  <input id="muralCidade" placeholder="Ex: São Paulo" required>
                </div>
                <div class="field">
                  <label>Estado *</label>
                  <input id="muralEstado" placeholder="SP" maxlength="2" required>
                </div>
                <div class="field full">
                  <label>Mensagem *</label>
                  <textarea id="muralMensagem" placeholder="Escreva sua mensagem aqui..." rows="3" maxlength="500" required></textarea>
                  <small style="color:var(--text-faint);font-size:11px;" id="muralCharCount">0/500 caracteres</small>
                </div>
                <div class="field full" style="margin-top:4px;">
                  <button type="button" class="btn btn-success" id="muralPublicarBtn">📨 Publicar recado</button>
                </div>
              </div>
            </form>
          </div>

          <div id="muralMessages">
            ${messages.length === 0 ? `
              <div class="mural-empty">
                <div class="em-ic">📭</div>
                <h3>Nenhum recado ainda</h3>
                <p>Seja o primeiro a deixar uma mensagem no mural!</p>
              </div>
            ` : messages.map(msg => `
              <div class="card mural-message" data-id="${msg.id}">
                <div class="header">
                  <div class="author">
                    ${msg.nome || 'Anônimo'}
                    <span class="location">📍 ${msg.cidade || '-'}/${msg.estado || '-'}</span>
                  </div>
                  <div class="datetime">
                    ${formatDateTime(msg.dataHora)}
                    ${msg.editado ? '<span style="color:var(--text-faint);font-size:10px;margin-left:6px;">(editado)</span>' : ''}
                  </div>
                </div>
                <div class="content">${msg.mensagem || ''}</div>
                ${isAdmin() ? `
                  <div class="actions">
                    <button class="btn btn-outline btn-sm" onclick="window.openMuralEditModal('${msg.id}')">✏️ Editar</button>
                    <button class="btn btn-danger btn-sm" onclick="window.__deleteMural('${msg.id}')">🗑️ Excluir</button>
                  </div>
                ` : ''}
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    window.publicarMural = function () {
      const nome = document.getElementById('muralNome').value.trim();
      const cidade = document.getElementById('muralCidade').value.trim();
      const estado = document.getElementById('muralEstado').value.trim().toUpperCase();
      const mensagem = document.getElementById('muralMensagem').value.trim();

      if (!nome) { toast("Digite seu nome.", "error"); return; }
      if (!cidade) { toast("Digite sua cidade.", "error"); return; }
      if (!estado) { toast("Digite seu estado (UF).", "error"); return; }
      if (estado.length !== 2) { toast("Estado deve ter 2 caracteres (ex: SP).", "error"); return; }
      if (!mensagem) { toast("Digite sua mensagem.", "error"); return; }
      if (mensagem.length > 500) { toast("Mensagem muito longa (máx. 500 caracteres).", "error"); return; }

      saveMuralMessage({
        nome,
        cidade,
        estado,
        mensagem
      }, null);

      document.getElementById('muralNome').value = '';
      document.getElementById('muralCidade').value = '';
      document.getElementById('muralEstado').value = '';
      document.getElementById('muralMensagem').value = '';
      document.getElementById('muralCharCount').textContent = '0/500 caracteres';

      render();
    };

    window.__deleteMural = function (id) {
      confirmAction("Tem certeza que deseja excluir esta mensagem?", () => {
        deleteMuralMessage(id);
        render();
      });
    };

    function initMuralCharCounter() {
      const textarea = document.getElementById('muralMensagem');
      const counter = document.getElementById('muralCharCount');
      if (textarea && counter) {
        textarea.addEventListener('input', function () {
          const count = this.value.length;
          counter.textContent = `${count}/500 caracteres`;
          if (count > 500) {
            counter.style.color = 'var(--danger)';
          } else {
            counter.style.color = 'var(--text-faint)';
          }
        });
      }
    }

    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'muralPublicarBtn') {
        window.publicarMural();
      }
    });

    const originalRender = render;
    render = function () {
      originalRender();
      setTimeout(initMuralCharCounter, 100);
    };

    function renderPlanoVip() {
      const c = state.config || defaultConfig();
      return `<section class="section container">
        <div class="section-head"><h2>Plano VIP</h2></div>
        <div class="vip-card" style="max-width:460px;">
          <span class="tag">Grupo exclusivo de gamers</span>
          <h3>SmartOnline</h3>
          <p class="grouptext">Assinatura mensal por pessoa</p>
          <div class="price-block"><span class="cur">R$</span><span class="val">${c.valorMensal}</span></div>
          <p class="price-sub">acesso mensal · por pessoa</p>
          <ul class="benefits">
            <li><span class="check">✔</span>Descontos em jogos digitais</li>

          <button class="btn btn-success btn-block" onclick="openVipSignupModal()">ASSINAR AGORA</button>
        </div>
      </section>`;

    function renderContato() {
      const c = state.config || defaultConfig();
      return `<section class="section container">
        <div class="section-head"><h2>Contato</h2></div>
        <div class="card" style="padding:24px;max-width:460px;">
          <p style="margin-bottom:10px;"><b>E-mail:</b> ${c.email}</p>
          <p style="margin-bottom:10px;"><b>WhatsApp:</b> ${c.whatsapp}</p>

        </div>

    }

    /* =====================================================================
       RENDER — ÁREA ADMINISTRADOR
       ===================================================================== */
    const adminTabs = [
      ["dashboard", "📊 Dashboard"],
      ["membros", "👥 Membros VIP"],
      ["loja", "🛒 Loja Online"],
      ["classificados", "📦 Classificados"],
      ["config", "⚙️ Configurações"],
      ["relatorios", "📈 Relatórios"]
    ];
    let adminTab = "dashboard";

    function renderAdmin() {
      if (!isAdmin()) {
        return `<div class="container"><div class="locked-page"><div class="ic">🔒</div><h3>Acesso restrito</h3><p>Faça login como administrador para acessar este painel.</p>
          <button class="btn btn-primary" onclick="openAdminLoginModal()">Login Administrador</button></div></div>`;
      }
      return `<div class="admin-shell">
        <aside class="admin-side">${adminTabs.map(([k, l]) => `<button class="${adminTab === k ? "active" : ""}" onclick="window.__setAdminTab('${k}')">${l}</button>`).join("")}</aside>
        <div class="admin-main">${renderAdminTab()}</div>
      </div>`;

    window.__setAdminTab = (k) => {

      render();

      switch (adminTab) {
        case "dashboard":
          return renderDashboard();
        case "membros":
          return renderAdminMembros();
        case "loja":
          return renderAdminLoja();
        case "classificados":

        case "config":
          return renderAdminConfig();
        case "relatorios":
          return renderRelatorios();
        default:
          return "";
      }
    }

    function renderDashboard() {
      const totalAnuncios = state.storeItems.length + state.classItems.length;
      const vendidos = state.storeItems.filter(i => i.status === "vendido").length + state.classItems.filter(i => i.status === "vendido").length;
      const ativos = totalAnuncios - vendidos;
      const totalMembros = state.vipMembers.length;
      const bloqueados = state.vipMembers.filter(m => m.status === "bloqueado").length;
      const hoje = new Date().toLocaleDateString("pt-BR");
      const cadastrosHoje = state.vipMembers.filter(m => {
        const data = m.dataCadastro ? new Date(m.dataCadastro) : null;
        return data && data.toLocaleDateString("pt-BR") === hoje;
      }).length;
      const mesAtual = new Date().getMonth();
      const cadastrosMes = state.vipMembers.filter(m => {
        const data = m.dataCadastro ? new Date(m.dataCadastro) : null;
        return data && data.getMonth() === mesAtual;
      }).length;
      const valorMensal = parseFloat((state.config?.valorMensal || "0").replace(",", ".")) || 0;
      const liberados = state.vipMembers.filter(m => m.status === "liberado").length;
      const receita = (valorMensal * liberados).toFixed(2).replace(".", ",");
      const totalMural = state.muralMessages.length;
      const novos = state.storeItems.filter(i => i.categoria === "novo").length;
      const usados = state.storeItems.filter(i => i.categoria === "usado").length;

      const stats = [
        ["Anúncios totais", totalAnuncios],
        ["Vendidos", vendidos],
        ["Ativos", ativos],
        ["Membros VIP", totalMembros],
        ["Bloqueados", bloqueados],
        ["Cadastros hoje", cadastrosHoje],
        ["Cadastros no mês", cadastrosMes],
        ["Receita prevista", "R$ " + receita],
        ["Mensagens no Mural", totalMural],
        ["🆕 Novos", novos],
        ["🔄 Usados", usados]
      ];
      return `<div class="section-head"><h2>Dashboard</h2></div>
        <div class="stat-grid">${stats.map(([l, n]) => `<div class="card stat-card"><div class="lbl">${l}</div><div class="num">${n}</div></div>`).join("")}</div>`;
    }

    function renderAdminMembros() {
      return `<div class="section-head"><h2>Membros VIP</h2></div>
        <div class="search-bar"><input id="memSearch" placeholder="Pesquisar por nome ou e-mail..." oninput="window.__filterMembers()"></div>
        <div class="table-wrap"><table class="data-table" id="membersTable">
          <thead><tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Cidade/UF</th>
            <th>Status</th>
            <th>Data Liberação</th>
            <th>Data Vencimento</th>
            <th>Dias Restantes</th>
            <th>Validade</th>
            <th>Ações</th>
          </tr></thead>
          <tbody>${renderMembersRows(state.vipMembers)}</tbody></table></div>`;
    }

    function renderMembersRows(list) {
      if (!list.length) return `<tr><td colspan="9" style="text-align:center;color:var(--text-faint);padding:30px;">Nenhum membro cadastrado.</td></tr>`;
      return list.map(m => {
        const validity = getValidityStatus(m);
        const days = getDaysRemaining(m);

        let daysDisplay = '-';
        let daysClass = '';
        if (days !== null) {
          if (days < 0) {
            daysDisplay = `Expirado há ${Math.abs(days)} dias`;
            daysClass = 'negative';
          } else if (days === 0) {
            daysDisplay = 'Hoje vence';
            daysClass = 'warning';
          } else {
            daysDisplay = `${days} dias`;
            daysClass = days <= 7 ? 'warning' : 'positive';
          }
        }

        const validityBadge = `
          <span class="validity-badge ${validity.class}">
            ${validity.status === 'active' ? '🟢' : validity.status === 'expiring' ? '🟡' : '🔴'} ${validity.label}
          </span>
        `;

        return `<tr>
          <td>${m.nome || "-"}</td>
          <td>${m.email || "-"}</td>
          <td>${m.cidade || "-"}/${m.estado || "-"}</td>
          <td><span class="status-dot status-${m.status}">${m.status}</span></td>
          <td>${formatDateTime(m.dataLiberacao)}</td>
          <td>${formatDateTime(m.dataVencimento)}</td>
          <td><span class="days-remaining ${daysClass}">${daysDisplay}</span></td>
          <td>${validityBadge}</td>
          <td style="display:flex;gap:6px;flex-wrap:wrap;">
            ${m.status !== 'liberado' ? `<button class="btn btn-success btn-sm" onclick="window.__vipSet('${m.id}','liberado')">Liberar</button>` : ''}
            ${m.status !== 'bloqueado' ? `<button class="btn btn-danger btn-sm" onclick="window.__vipSet('${m.id}','bloqueado')">Bloquear</button>` : ''}
            <button class="btn btn-ghost btn-sm" onclick="window.__vipDelete('${m.id}')">Excluir</button>
          </td>
        </tr>`;
      }).join("");
    }

    window.__vipSet = function (id, status) {
      if (status === 'liberado') {
        liberarVip(id);
      } else {
        setVipStatus(id, status);
      }
    };
    window.__vipDelete = (id) => confirmAction("Excluir este membro VIP?", () => deleteVipMember(id));
    window.__filterMembers = () => {
      const q = document.getElementById("memSearch").value.toLowerCase();
      const filtered = state.vipMembers.filter(m => (m.nome || "").toLowerCase().includes(q) || (m.email || "").toLowerCase().includes(q));
      document.querySelector("#membersTable tbody").innerHTML = renderMembersRows(filtered);
    };

    function renderAdminLoja() {
      return `<div class="section-head"><h2>Loja Online</h2>
        <button class="btn btn-primary btn-sm" onclick="openStoreFormModal()">+ Novo item</button></div>
        <div class="grid grid-4">${state.storeItems.length ? state.storeItems.map(storeCardHTML).join("") : emptyState("🛒", "Nenhum item cadastrado.")}</div>`;
    }

    function renderAdminClassificados() {
      return `<div class="section-head"><h2>Classificados</h2></div>
        <div class="grid grid-4">${state.classItems.length ? state.classItems.map(classCardHTML).join("") : emptyState("📦", "Nenhum anúncio publicado.")}</div>`;
    }

    function renderAdminConfig() {
      const c = state.config || defaultConfig();
      return `<div class="section-head"><h2>Configurações do Site</h2></div>
        <div class="card" style="padding:24px;max-width:760px;">
          <div class="form-grid">
            <div class="field"><label>Nome do site</label><input id="cfNome" value="${c.nomeSite}"></div>
            <div class="field"><label>URL do logo</label><input id="cfLogo" value="${c.logoUrl}"></div>
            <div class="field"><label>Valor mensal (ex: 0,97)</label><input id="cfValor" value="${c.valorMensal}"></div>
            <div class="field"><label>Chave PIX</label><input id="cfPix" value="${c.chavePix}"></div>
            <div class="field"><label>WhatsApp</label><input id="cfWhats" value="${c.whatsapp}"></div>
            <div class="field"><label>E-mail</label><input id="cfEmail" value="${c.email}"></div>
            <div class="field"><label>Facebook</label><input id="cfFb" value="${c.facebook}"></div>
            <div class="field"><label>Instagram</label><input id="cfIg" value="${c.instagram}"></div>
            <div class="field"><label>Discord</label><input id="cfDc" value="${c.discord}"></div>
            <div class="field"><label>Cor principal</label><input id="cfCor1" type="color" value="${c.corPrincipal}"></div>
            <div class="field"><label>Cor secundária</label><input id="cfCor2" type="color" value="${c.corSecundaria}"></div>
            <div class="field"><label>Banner (URL)</label><input id="cfBanner" value="${c.bannerUrl}"></div>
            <div class="field full"><label>Mensagem de boas-vindas</label><textarea id="cfMsg">${c.mensagemBoasVindas}</textarea></div>
          </div>
          <button class="btn btn-success" style="margin-top:16px;" onclick="window.__saveConfig()">Salvar configurações</button>
        </div>`;
    }
    window.__saveConfig = () => {
      saveSiteConfig({
        nomeSite: document.getElementById("cfNome").value,
        logoUrl: document.getElementById("cfLogo").value,
        valorMensal: document.getElementById("cfValor").value,
        chavePix: document.getElementById("cfPix").value,
        whatsapp: document.getElementById("cfWhats").value,
        email: document.getElementById("cfEmail").value,
        facebook: document.getElementById("cfFb").value,
        instagram: document.getElementById("cfIg").value,
        discord: document.getElementById("cfDc").value,
        corPrincipal: document.getElementById("cfCor1").value,
        corSecundaria: document.getElementById("cfCor2").value,
        bannerUrl: document.getElementById("cfBanner").value,
        mensagemBoasVindas: document.getElementById("cfMsg").value
      });
    };

    function renderRelatorios() {
      const c = state.config || defaultConfig();
      const liberados = state.vipMembers.filter(m => m.status === "liberado").length;
      const valorMensal = parseFloat((c.valorMensal || "0").replace(",", ".")) || 0;
      const expirados = state.vipMembers.filter(m =>
        m.status === 'bloqueado' && m.motivoBloqueio === 'Plano VIP expirado'
      ).length;
      const totalMural = state.muralMessages.length;
      const novos = state.storeItems.filter(i => i.categoria === "novo").length;
      const usados = state.storeItems.filter(i => i.categoria === "usado").length;

      return `<div class="section-head"><h2>Relatórios</h2></div>
        <div class="grid grid-3">
          <div class="card stat-card"><div class="lbl">Membros liberados</div><div class="num">${liberados}</div></div>
          <div class="card stat-card"><div class="lbl">Receita mensal estimada</div><div class="num">R$ ${(valorMensal * liberados).toFixed(2).replace(".", ",")}</div></div>
          <div class="card stat-card"><div class="lbl">Ticket médio</div><div class="num">R$ ${c.valorMensal}</div></div>
          <div class="card stat-card"><div class="lbl">Expirados automaticamente</div><div class="num">${expirados}</div></div>
          <div class="card stat-card"><div class="lbl">Mensagens no Mural</div><div class="num">${totalMural}</div></div>
          <div class="card stat-card"><div class="lbl">🆕 Produtos Novos</div><div class="num">${novos}</div></div>
          <div class="card stat-card"><div class="lbl">🔄 Produtos Usados</div><div class="num">${usados}</div></div>
        </div>`;
    }

    /* =====================================================================
       RENDER MASTER
       ===================================================================== */
    function render() {
      if (state.loading) {
        document.getElementById("app").innerHTML = `<div class="loader-wrap"><div class="spinner"></div></div>`;
        return;
      }

      renderAuthArea();
      const app = document.getElementById("app");
      if (!state.config) {
        app.innerHTML = `<div class="loader-wrap"><div class="spinner"></div></div>`;
        return;
      }
      let html = "";
      switch (state.route) {
        case "home":
          html = renderHome();
          break;
        case "loja":
          html = renderLoja();
          break;
        case "classificados":
          html = renderClassificados();
          break;
        case "como-funciona":
          html = renderComoFunciona();
          break;
        case "plano-vip":
          html = renderPlanoVip();
          break;
        case "contato":
          html = renderContato();
          break;
        case "admin":
          html = renderAdmin();
          break;
        default:
          html = renderHome();
      }
      app.innerHTML = html;

      if (state.route === "como-funciona") {
        setTimeout(initMuralCharCounter, 200);
        const btn = document.getElementById('muralPublicarBtn');
        if (btn) {
          btn.removeEventListener('click', window.publicarMural);
          btn.addEventListener('click', window.publicarMural);
        }
      }
    }

    /* =====================================================================
       BOOT
       ===================================================================== */
    (async function boot() {
      state.route = (location.hash || "#home").replace("#", "") || "home";

      try {
        // Inicializar Firebase e carregar dados
        await initDatabase();
        await loadConfig();
        await loadCollections();
        initAuth();

        // Migrar dados do LocalStorage (opcional)
        // await migrateLocalStorageToFirestore();

        // Verificar validade ao iniciar
        setTimeout(checkVipValidity, 200);
        setInterval(checkVipValidity, 60000);
      } catch (e) {
        console.error('Erro ao inicializar aplicação:', e);
        toast('Erro ao conectar ao servidor. Verifique sua conexão.', 'error');
        state.loading = false;
        render();
      }
    })();
  </script>
</body>

</html>
